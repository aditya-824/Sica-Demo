<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>My first three.js app</title>
    <style>
      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/main.js"></script>

    <main>
      <div id="control-panel">
        <img src="/sica-logo.png" alt="Sica Logo" id="sica-logo">
        <div class="categories">
          <div class="category-container" id="profiles">
            <img src="/icons/profiles-icon.png" alt="Profiles" class="category-icon" id="profiles-icon">
            <p>Profiles</p>
          </div>
          <div class="category-container" id="accessories">
            <img src="/icons/accessories-icon.jpg" alt="Accessories" class="category-icon" id="accessories-icon">
            <p>Accessories</p>
          </div>
        </div>
    </main>

    <style>
        body {
          margin: 0;
          font-family: 'Segoe UI', SegoeUI, 'Segoe WP', 'Helvetica Neue', Arial, 'sans-serif';
          font-size: 14px;
        }
        #c {
            width: 100%;
            height: 100%;
        }
        #sica-logo {
            width: 100px;
            height: auto;
            margin: 4px;
        }
        #control-panel {
            position: absolute;
            display: flex;
            flex-grow: 1;
            flex-direction: column;
            top: 10px;
            left: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 2px;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .control-panel-button {
            margin: 4px;
            padding: 4px;
            font-size: 14px;
            background-color: rgba(231, 231, 231, 0.752);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .category-icon {
            width: 100px;
            height: 100px;
            margin: 4px;
            border-radius: 5px;
        }
        .categories {
            display: flex;
            justify-content: space-around;
        }
        .category-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 5px;
        }
        .category-container p {
            margin: 0px 2px 6px 2px;
            font-size: 14px;
        }
        .category-container:hover {
            background-color: rgba(231, 231, 231, 0.752);
            cursor: pointer;
        }
      </style>
</html>
